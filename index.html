<div class="lab-simulator">
  <h2 class="sr-only">Simulador interactivo de laboratorio: Generador de funciones y osciloscopio</h2>

  <div class="panel generator-panel">
    <div class="panel-header">GENERADOR DE FUNCIONES</div>
    
    <div class="lcd-display">
      <div id="lcdA" class="lcd-line line-ch1">CH1  SIN  1.0Hz  1.0V</div>
      <div id="lcdB" class="lcd-line line-ch2">CH2  SQR  1.0Hz  1.0V</div>
    </div>

    <div class="channel-card ch1-card">
      <div class="channel-header">
        <span class="channel-title">CANAL 1</span>
        <label class="switch-container">
          <input type="checkbox" id="showA" checked>
          <span class="slider"></span>
          <span class="switch-label">ON</span>
        </label>
      </div>
      <div class="wave-selector" id="wavesA"></div>
      <div class="knobs-row">
        <div class="knob-wrapper">
          <div class="knob" id="knobFreqA"></div>
          <span class="knob-label">FREQ</span>
        </div>
        <div class="knob-wrapper">
          <div class="knob" id="knobAmpA"></div>
          <span class="knob-label">AMPL</span>
        </div>
        <div class="knob-wrapper">
          <div class="knob" id="knobPhA"></div>
          <span class="knob-label">FASE</span>
        </div>
      </div>
    </div>

    <div class="channel-card ch2-card">
      <div class="channel-header">
        <span class="channel-title">CANAL 2</span>
        <label class="switch-container">
          <input type="checkbox" id="showB" checked>
          <span class="slider"></span>
          <span class="switch-label">ON</span>
        </label>
      </div>
      <div class="wave-selector" id="wavesB"></div>
      <div class="knobs-row">
        <div class="knob-wrapper">
          <div class="knob" id="knobFreqB"></div>
          <span class="knob-label">FREQ</span>
        </div>
        <div class="knob-wrapper">
          <div class="knob" id="knobAmpB"></div>
          <span class="knob-label">AMPL</span>
        </div>
        <div class="knob-wrapper">
          <div class="knob" id="knobPhB"></div>
          <span class="knob-label">FASE</span>
        </div>
      </div>
    </div>
  </div>

  <div class="panel scope-panel">
    <div class="panel-header">
      <span>OSCILOSCOPIO DIGITAL</span>
      <div class="status-indicator">
        <span class="led-live"></span>
        <span class="status-text">RUNNING</span>
      </div>
    </div>
    
    <div class="screen-container">
      <canvas id="scope" width="640" height="280"></canvas>
    </div>
    
    <div class="scope-footer-info">
      <div class="info-tag">1V / div</div>
      <div class="info-tag">0.5s / div</div>
      <div id="readoutR" class="info-tag math-tag">MATH: ninguna</div>
    </div>
    
    <div class="math-controls-wrapper">
      <span class="math-label">OPERACIONES MATH:</span>
      <div class="math-buttons" id="mathButtons"></div>
    </div>
  </div>
</div>

<style>
:root {
  --bg-dark: #12141c;
  --panel-bg: #1e222b;
  --card-bg: #252a36;
  --lcd-bg: #091209;
  --lcd-text: #4af626;
  --ch1-color: #f5b041;
  --ch1-glow: rgba(245, 176, 65, 0.2);
  --ch2-color: #3498db;
  --ch2-glow: rgba(52, 152, 219, 0.2);
  --math-color: #9b59b6;
  --text-muted: #8892b0;
  --border-color: #2e3545;
}

.lab-simulator {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 20px;
  background: var(--bg-dark);
  padding: 20px;
  border-radius: 16px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  color: #f8f9fa;
}

@media (max-width: 900px) {
  .lab-simulator { grid-template-columns: 1fr; }
}

.panel {
  background: var(--panel-bg);
  border-radius: 12px;
  padding: 16px;
  border: 1px solid var(--border-color);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
}

.panel-header {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  margin-bottom: 14px;
  text-transform: uppercase;
}

/* LCD Display */
.lcd-display {
  background: var(--lcd-bg);
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 16px;
  font-family: 'Courier New', Courier, monospace;
  border: 2px solid #000;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
}
.lcd-line {
  font-size: 13px;
  font-weight: bold;
  line-height: 1.4;
  text-shadow: 0 0 4px var(--lcd-text);
  white-space: pre;
}
.line-ch1 { color: var(--ch1-color); text-shadow: 0 0 4px var(--ch1-glow); }
.line-ch2 { color: var(--ch2-color); text-shadow: 0 0 4px var(--ch2-glow); }

/* Channel Cards */
.channel-card {
  background: var(--card-bg);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 14px;
  border: 1px solid var(--border-color);
}
.channel-card:last-child { margin-bottom: 0; }

.channel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.channel-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.ch1-card .channel-title { color: var(--ch1-color); }
.ch2-card .channel-title { color: var(--ch2-color); }

/* Switch Toggle Styling */
.switch-container {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
}
.switch-container input { display: none; }
.slider {
  position: relative;
  width: 28px;
  height: 16px;
  background-color: #454d5e;
  border-radius: 10px;
  transition: .2s;
}
.slider:before {
  position: absolute;
  content: "";
  height: 10px; width: 10px;
  left: 3px; bottom: 3px;
  background-color: white;
  border-radius: 50%;
  transition: .2s;
}
input:checked + .slider { background-color: #2ecc71; }
input:checked + .slider:before { transform: translateX(12px); }
.switch-label { font-size: 10px; font-weight: bold; color: var(--text-muted); }

/* Wave buttons */
.wave-selector {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}
.wbtn {
  flex: 1;
  height: 32px;
  border-radius: 6px;
  background: #1a1d24;
  border: 1px solid var(--border-color);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}
.wbtn svg { width: 22px; height: 16px; }
.wbtn path { stroke: var(--text-muted); transition: stroke 0.2s; }
.wbtn:hover { background: #222733; }

.ch1-card .wbtn.active {
  background: var(--ch1-glow);
  border-color: var(--ch1-color);
  box-shadow: 0 0 8px var(--ch1-glow);
}
.ch1-card .wbtn.active path { stroke: var(--ch1-color); }

.ch2-card .wbtn.active {
  background: var(--ch2-glow);
  border-color: var(--ch2-color);
  box-shadow: 0 0 8px var(--ch2-glow);
}
.ch2-card .wbtn.active path { stroke: var(--ch2-color); }

/* Knobs */
.knobs-row {
  display: flex;
  justify-content: space-around;
  align-items: center;
}
.knob-wrapper {
  text-align: center;
}
.knob {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, #2d323f, #1a1d24, #2d323f);
  position: relative;
  cursor: ns-resize;
  touch-action: none;
  border: 2px solid #111;
  box-shadow: 0 4px 6px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
  margin: 0 auto 6px;
}
.knob::after {
  content: '';
  position: absolute;
  top: 4px;
  left: 50%;
  width: 3px;
  height: 10px;
  background: #ffffff;
  border-radius: 2px;
  transform-origin: center bottom;
  transform: translateX(-50%) rotate(var(--rot,0deg));
}
.knob-label {
  color: var(--text-muted);
  font-size: 9px;
  font-weight: bold;
  letter-spacing: 0.5px;
}

/* Scope Display */
.scope-panel {
  display: flex;
  flex-direction: column;
}
.scope-panel .panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.status-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  background: #1a1d24;
  padding: 4px 8px;
  border-radius: 20px;
  border: 1px solid var(--border-color);
}
.led-live {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #2ecc71;
  box-shadow: 0 0 8px #2ecc71;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0% { opacity: 0.4; }
  50% { opacity: 1; }
  100% { opacity: 0.4; }
}
.status-text {
  font-size: 9px;
  font-family: monospace;
  color: #2ecc71;
  font-weight: bold;
}
.screen-container {
  background: #050a06;
  border-radius: 8px;
  padding: 4px;
  border: 3px solid #1a1d24;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
}
#scope {
  width: 100%;
  display: block;
  border-radius: 4px;
}

.scope-footer-info {
  display: flex;
  gap: 10px;
  font-family: monospace;
  font-size: 11px;
  margin: 10px 0 16px;
}
.info-tag {
  background: #1a1d24;
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid var(--border-color);
  color: #a2aabf;
}
.math-tag {
  margin-left: auto;
  color: var(--math-color);
  font-weight: bold;
}

/* Math Controls */
.math-controls-wrapper {
  background: #1a1d24;
  padding: 10px 12px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  border: 1px solid var(--border-color);
}
.math-label {
  font-size: 10px;
  font-weight: bold;
  color: var(--text-muted);
  white-space: nowrap;
}
.math-buttons {
  display: flex;
  gap: 6px;
  flex: 1;
}
.mbtn {
  flex: 1;
  padding: 6px 4px;
  background: var(--card-bg);
  border: 1px solid var(--border-color);
  border-radius: 4px;
  color: #a2aabf;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.mbtn:hover { background: #2d3342; }
.mbtn.active {
  background: rgba(155, 89, 182, 0.2);
  border-color: var(--math-color);
  color: #d7bde2;
  box-shadow: 0 0 6px rgba(155, 89, 182, 0.3);
}
</style>

<script>
(function(){
const canvas = document.getElementById('scope');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height, midY = H/2;

const params = {
  typeA:'sine', freqA:1, ampA:1, phA:0, showA:true,
  typeB:'square', freqB:1, ampB:1, phB:0, showB:true,
  op:'none'
};

const waveShapes = {
  sine: 'M2,7 C6,1 10,1 14,7 C18,13 22,13 26,7',
  square: 'M2,3 L2,3 L2,11 L14,11 L14,3 L26,3 L26,11',
  triangle: 'M2,11 L8,3 L20,11 L26,3',
  saw: 'M2,11 L14,3 L14,11 L26,3'
};

function makeWaveButtons(container, key, defaultType){
  Object.keys(waveShapes).forEach(type => {
    const b = document.createElement('button');
    b.className = 'wbtn' + (type===defaultType?' active':'');
    b.innerHTML = '<svg viewBox="0 0 28 14"><path d="'+waveShapes[type]+'" fill="none" stroke-width="2"/></svg>';
    b.onclick = () => {
      params[key] = type;
      container.querySelectorAll('.wbtn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
    };
    container.appendChild(b);
  });
}
makeWaveButtons(document.getElementById('wavesA'), 'typeA', 'sine');
makeWaveButtons(document.getElementById('wavesB'), 'typeB', 'square');

document.getElementById('showA').addEventListener('change', e => params.showA = e.target.checked);
document.getElementById('showB').addEventListener('change', e => params.showB = e.target.checked);

function makeKnob(id, min, max, initial, key, degRange){
  const el = document.getElementById(id);
  let value = initial;
  const range = degRange || 270;
  function setRot(){
    const pct = (value-min)/(max-min);
    el.style.setProperty('--rot', (-range/2 + pct*range) + 'deg');
  }
  setRot();
  let dragging = false, startY = 0, startVal = value;
  el.addEventListener('pointerdown', e => {
    dragging = true; startY = e.clientY; startVal = value;
    el.setPointerCapture(e.pointerId);
  });
  el.addEventListener('pointermove', e => {
    if(!dragging) return;
    const dy = startY - e.clientY;
    const span = max-min;
    value = Math.min(max, Math.max(min, startVal + dy*span/150));
    value = Math.round(value*10)/10;
    params[key] = value;
    setRot();
  });
  el.addEventListener('pointerup', () => dragging = false);
}
makeKnob('knobFreqA', 0.2, 5, 1, 'freqA');
makeKnob('knobAmpA', 0.1, 3, 1, 'ampA');
makeKnob('knobPhA', 0, 360, 0, 'phA', 340);
makeKnob('knobFreqB', 0.2, 5, 1, 'freqB');
makeKnob('knobAmpB', 0.1, 3, 1, 'ampB');
makeKnob('knobPhB', 0, 360, 0, 'phB', 340);

const opNames = {none:'ninguna', sum:'CH1+CH2', sub:'CH1-CH2', mul:'CH1xCH2'};
const mathContainer = document.getElementById('mathButtons');
[['none','Ninguna'],['sum','CH1 + CH2'],['sub','CH1 - CH2'],['mul','CH1 × CH2']].forEach(([op,label]) => {
  const b = document.createElement('button');
  b.className = 'mbtn' + (op==='none'?' active':'');
  b.textContent = label;
  b.onclick = () => {
    params.op = op;
    mathContainer.querySelectorAll('.mbtn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
  };
  mathContainer.appendChild(b);
});

function wave(type, t){
  const phase = (t % 1 + 1) % 1;
  if(type==='sine') return Math.sin(2*Math.PI*phase);
  if(type==='square') return phase < 0.5 ? 1 : -1;
  if(type==='triangle') return phase < 0.5 ? (4*phase - 1) : (3 - 4*phase);
  if(type==='saw') return 2*phase - 1;
}
function valAt(prefix, tSec){
  const type = params['type'+prefix], f = params['freq'+prefix], a = params['amp'+prefix], ph = params['ph'+prefix];
  return a * wave(type, f * tSec + ph/360);
}
function drawGrid(){
  ctx.strokeStyle = '#0f2015'; ctx.lineWidth = 1;
  for(let x=0; x<=W; x+=W/10){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for(let y=0; y<=H; y+=H/8){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.strokeStyle = '#1a3a25'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,midY); ctx.lineTo(W,midY); stroke();
}
function drawTrace(color, fn){
  ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.beginPath();
  ctx.shadowBlur = 4; ctx.shadowColor = color; // Efecto brillo fósforo
  const windowSec = 3, pxPerVolt = 32;
  for(let x=0; x<=W; x++){
    const tSec = (x/W) * windowSec + timeOffset;
    const y = midY - fn(tSec) * pxPerVolt;
    if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.stroke();
  ctx.shadowBlur = 0; // Reset para no ralentizar el grid
}
let timeOffset = 0, lastTs = null;
function fmt(prefix){
  const abbr = {sine:'SIN',square:'SQR',triangle:'TRI',saw:'SAW'};
  return 'CH'+(prefix==='A'?'1':'2')+'  '+abbr[params['type'+prefix]]+'  '+params['freq'+prefix].toFixed(1)+'Hz  '+params['amp'+prefix].toFixed(1)+'V';
}
function animate(ts){
  if(lastTs===null) lastTs = ts;
  const dt = (ts-lastTs)/1000; lastTs = ts;
  timeOffset += dt*0.5;
  ctx.clearRect(0,0,W,H);
  drawGrid();
  if(params.showA) drawTrace('#f5b041', t => valAt('A', t));
  if(params.showB) drawTrace('#3498db', t => valAt('B', t));
  if(params.op!=='none'){
    drawTrace('#9b59b6', t => {
      const a = valAt('A',t), b = valAt('B',t);
      if(params.op==='sum') return a+b;
      if(params.op==='sub') return a-b;
      if(params.op==='mul') return a*b;
    });
  }
  document.getElementById('lcdA').textContent = fmt('A') + (params.showA?'':'  OFF');
  document.getElementById('lcdB').textContent = fmt('B') + (params.showB?'':'  OFF');
  document.getElementById('readoutR').textContent = 'MATH: ' + opNames[params.op];
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
})();
</script>
